services:
  postgres:
    image: postgres:16-alpine
    container_name: vigie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vigie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vigie_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-vigie}
    ports:
      - '5432:5432'
    volumes:
      - vigie_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-vigie} -d $${POSTGRES_DB:-vigie}']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  vigie_pgdata:
